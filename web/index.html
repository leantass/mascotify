<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="theme-color" content="#66cccc">
  <meta
    name="description"
    content="Mascotify es una experiencia multiplataforma para identidad, matching, mensajeria y trazabilidad de mascotas."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mascotify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mascotify</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7fbfc;
      font-family: Arial, sans-serif;
    }

    #mascotify-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f7fbfc 0%, #ffffff 100%);
      z-index: 9999;
      transition: opacity 180ms ease;
    }

    #mascotify-loading.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    #mascotify-loading img {
      width: min(320px, 72vw);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div id="mascotify-loading" aria-label="Mascotify cargando">
    <img src="branding/logo-mascotify.png" alt="Mascotify">
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('mascotify-loading');
      if (!loading) return;
      loading.classList.add('is-hidden');
      window.setTimeout(function () {
        loading.remove();
      }, 220);
    });
  </script>
</body>
</html>
