name: Flutter CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC; 06:00 UTC equivale aproximadamente a 03:00 AM Argentina.
    - cron: "0 6 * * *"

jobs:
  analyze-and-test:
    name: Analyze and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web
